{% extends "base.html" %}

{% block styles %}
  {{ super() }}
  <style>
    .md-header__explorer {
      display: flex;
      align-items: center;
      margin-left: 0.2rem;
    }
    .md-header__explorer a {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.8rem;
      border-radius: 1rem;
      background: var(--md-accent-fg-color);
      color: var(--md-accent-bg-color) !important;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: opacity 200ms;
      white-space: nowrap;
    }
    .md-header__explorer a:hover {
      opacity: 0.85;
    }
    .md-header__explorer svg {
      width: 0.9rem;
      height: 0.9rem;
      fill: currentColor;
    }
  </style>
{% endblock %}

{% block header %}
  {{ super() }}
  <script>
    // Inject Explorer pill button into the header bar
    document.addEventListener('DOMContentLoaded', function() {
      var container = document.querySelector('.md-header__inner');
      if (!container) return;

      // Build URL from MkDocs base_url (works for both prod and PR preview)
      var base = '{{ config.site_url or base_url }}'.replace(/\/$/, '');
      var url = base + '/playground/';

      var source = container.querySelector('.md-header__source');
      var btn = document.createElement('div');
      btn.className = 'md-header__explorer';
      btn.innerHTML =
        '<a href="' + url + '" target="_blank" title="Open Explorer">' +
        '  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">' +
        '    <path d="M8 5v14l11-7z"/>' +
        '  </svg>' +
        '  Explorer' +
        '</a>';
      if (source) {
        container.insertBefore(btn, source);
      } else {
        container.appendChild(btn);
      }
    });
  </script>
{% endblock %}
