name: Bug Report
description: Report a bug in Clifft
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps to reproduce the issue.
      placeholder: |
        ```python
        import clifft
        # ...
        ```
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Clifft version (`python -c "import clifft; print(clifft.__version__)"`)
        - OS and architecture
        - Python version
      placeholder: |
        - Clifft: 0.1.0
        - OS: Ubuntu 24.04 x86_64
        - Python: 3.12.3
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Error messages, logs, or other relevant details.
    validations:
      required: false
