name: Docs PR Preview

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize, closed]

concurrency:
  group: "pr-preview-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    if: github.event.action != 'closed'
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Build explorer SPA ---
      - name: Cache Wasm build
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: build-wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('src/wasm/**', 'src/ucc/**', 'cmake/**') }}

      - name: Build Wasm module
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            emscripten/emsdk:3.1.74 \
            bash -c '
              emcmake cmake -B build-wasm -S src/wasm \
                -DCMAKE_BUILD_TYPE=Release \
                -DFETCHCONTENT_QUIET=ON && \
              cmake --build build-wasm -j$(nproc)'

      - name: Copy Wasm artifacts
        run: |
          mkdir -p explorer/public
          cp build-wasm/ucc_wasm.js explorer/public/
          cp build-wasm/ucc_wasm.wasm explorer/public/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: explorer/package-lock.json

      - name: Build explorer
        run: |
          cd explorer && npm ci
          VITE_BASE_PATH=/ucc-next/pr-preview/pr-${{ github.event.number }}/playground/ npm run build

      # --- Build MkDocs (docs group only, no C++ extension needed) ---
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build docs
        run: uv run --only-group docs mkdocs build
        env:
          SITE_URL: https://unitaryfoundation.github.io/ucc-next/pr-preview/pr-${{ github.event.number }}/

      # --- Merge: copy explorer into mkdocs output ---
      - name: Copy explorer into site
        run: cp -r explorer/dist site/playground

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-dist
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    if: github.event.pull_request.head.repo.fork == false
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-dist
          path: site

      - name: Deploy PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          pages-base-url: unitaryfoundation.github.io/ucc-next
          action: auto

  cleanup:
    runs-on: ubuntu-24.04
    if: github.event.action == 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove PR preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          pages-base-url: unitaryfoundation.github.io/ucc-next
          action: remove
