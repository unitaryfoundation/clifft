name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  wasm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Wasm build
        id: wasm-cache
        uses: actions/cache@v4
        with:
          path: build-wasm
          key: wasm-${{ runner.os }}-${{ hashFiles('src/wasm/**', 'src/ucc/**', 'cmake/**') }}

      - name: Build Wasm module
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            emscripten/emsdk:3.1.74 \
            bash -c '
              emcmake cmake -B build-wasm -S src/wasm \
                -DCMAKE_BUILD_TYPE=Release \
                -DFETCHCONTENT_QUIET=ON && \
              cmake --build build-wasm -j$(nproc)'

      - name: Run Wasm smoke tests
        run: |
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -v "${{ github.workspace }}:/src" \
            -w /src \
            emscripten/emsdk:3.1.74 \
            node --experimental-vm-modules src/wasm/test_wasm.mjs

  lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pre-commit-

      - name: Run pre-commit
        run: uv tool run pre-commit run --all-files

  explorer-lint:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: explorer/package-lock.json

      - name: Install dependencies
        run: cd explorer && npm ci

      - name: TypeScript type check
        run: cd explorer && npx tsc -b

      - name: ESLint
        run: cd explorer && npm run lint

  build-and-test:
    needs: lint
    runs-on: ubuntu-24.04
    env:
      CMAKE_BUILD_TYPE: Debug
      SKBUILD_CMAKE_BUILD_TYPE: Debug
      CMAKE_C_COMPILER_LAUNCHER: ccache
      CMAKE_CXX_COMPILER_LAUNCHER: ccache
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-ccache-${{ env.CMAKE_BUILD_TYPE }}

      - name: Setup uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      # Force Debug mode for both C++ and Python builds to catch assert() failures
      - name: Configure C++ build
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build C++
        run: cmake --build build --parallel

      - name: Run C++ tests (CTest + JUnit)
        run: |
          set -euo pipefail
          ctest --test-dir build \
            --output-on-failure \
            --parallel \
            --timeout 300 \
            --output-junit build/ctest-junit.xml \
            | tee build/ctest.log

      - name: Publish C++ test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/ctest-junit.xml
          fail_on_failure: false

      - name: Upload C++ test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cpp-test-artifacts
          path: |
            build/ctest.log
            build/ctest-junit.xml
          if-no-files-found: ignore

      - name: Install Python package
        run: uv pip install -e ".[dev]"

      - name: Run Python tests (JUnit)
        run: uv run pytest tests/python/ -v --junitxml=build/pytest-junit.xml

      - name: Test documentation code examples
        run: uv run pytest --codeblocks docs/ README.md -v

      - name: Publish Python test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: build/pytest-junit.xml
          fail_on_failure: false

      - name: Upload Pytest JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-junit
          path: build/pytest-junit.xml
          if-no-files-found: ignore
